name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.manifest_version !== 3) throw new Error('manifest_version must be 3');
            if (!m.version) throw new Error('version is required');
            if (!m.name) throw new Error('name is required');
            console.log('OK', m.name, m.version);
          "

      - name: Pack extension zip
        run: |
          chmod +x scripts/pack.sh
          ./scripts/pack.sh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeaderControl-zip
          path: dist/HeaderControl-*.zip
          if-no-files-found: error
